name: Daily Random Commits

on:
  schedule:
    - cron: '0 10 * * *' # runs every day at 10:00 UTC
  workflow_dispatch: # allows manual trigger

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate random commit messages
        shell: bash
        run: |
          echo "Automated random commit generation..."
          mkdir -p logs
          echo "$(date): Daily commit entry" >> logs/daily.txt
          
          MESSAGE=$(shuf -n 1 <<'EOF'
           JavaScript closures allow functions to access outer scope variables.
           Python's list comprehensions are both elegant and efficient.
           Java streams simplify functional-style operations.
          JavaScript async/await makes asynchronous code readable.
          Python's generators help manage memory with large data.
          Java is platform-independent thanks to the JVM.
          EOF
          )

          echo "$MESSAGE" >> logs/daily.txt
          git add logs/daily.txt
          git commit -m "$MESSAGE" || echo "No changes to commit"

      - name: Push commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push
